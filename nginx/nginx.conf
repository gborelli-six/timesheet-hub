server {
    listen 80;
    client_max_body_size 10M;

    resolver 127.0.0.11:53 valid=10s;
    resolver_timeout 5s;

    location /api/ {
        set $backend http://backend.railway.internal:8000;
        proxy_pass         $backend/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location / {
        set $frontend http://frontend.railway.internal:3000;
        proxy_pass       $frontend;
        proxy_set_header Host $host;
    }
}
